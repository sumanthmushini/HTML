<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>BASKET</h1>
    <ol>
    <li><h2>Ordered List</h2></li>
    <ol reversed type="A" start="15">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <li><h2>Unordered list</h2></li>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    </ol>
</body>
</html>
